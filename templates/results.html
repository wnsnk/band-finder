<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band finder results</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>

<body>
    <h1>BandFinder</h1>
    {%for article in articles:%}
    <div>
        <h2><a href="{{article['link']}}">{{article['title']}}</a></h2>
        <h3>{{article['date']}} {{article['category']}}</h3>
        <p>{{article['message']}}</p>
        <hr>
    </div>
    {%endfor%}
</body>

</html>

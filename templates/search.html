<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band finder results</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>


<body data-bs-theme="dark">
    {% include 'header.html' %}

    <div class="container"
        style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">
        <h1 style="font-size: x-large;" class="display-6 fw-bold text-body-emphasis lh-1 mb-3">Zoekopdracht: {{ query }}
        </h1>
        {%for article in articles:%}
        <div class="card" style="width: 90%;">
            <div class="card-body">
                <h2 class="card-title" style="font-size: x-large; "><a
                        href="{{article['link']}}">{{article['title']}}</a>
                </h2>
                <h3 style="font-size: medium;">{{article['date']}}, {{article['category']}}</h3>
                <p style="font-size: medium;"><i>Gevonden op: <a
                            href="http://{{article['website']}}">{{article['website']}}</a></i></p>
                <p class="card-text">{{article['message']}}</p>
                <a href="{{article['link']}}" class="btn btn-light">Bekijk volledige advertentie</a>
                <a href="{{ url_for('add_to_favourites', id=article.id) }}" class="btn btn-warning">Voeg toe aan
                    favorieten</a>
            </div>
        </div>
        <br>
        {%endfor%}
    </div>

</body>

</html>
